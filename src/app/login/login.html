<section class="login-page">
  <div class="login-overlay"></div>

  <div class="login-card-wrapper">
    <div class="card login-card shadow">
      <div class="card-body p-4 p-md-5">
        <img src="/MiniLogoEHP.png" alt="EHP Logística" class="login-logo mb-3" />
        <h2 class="h4 mb-4">Iniciar Sesión</h2>

        <div *ngIf="errorMessage()" class="alert alert-danger" role="alert">
          {{ errorMessage() }}
        </div>

        <form [formGroup]="authForm" (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input id="email" type="email" class="form-control" formControlName="email" autocomplete="email" />
            <small class="text-danger" *ngIf="authForm.get('email')?.invalid && authForm.get('email')?.touched">
              Ingresa un email válido.
            </small>
          </div>

          <div class="mb-4">
            <label class="form-label" for="password">Contraseña</label>
            <input id="password" type="password" class="form-control" formControlName="password" autocomplete="current-password" />
            <small class="text-danger" *ngIf="authForm.get('password')?.invalid && authForm.get('password')?.touched">
              La contraseña debe tener al menos 6 caracteres.
            </small>
          </div>

          <button type="submit" class="btn btn-primary w-100 login-submit-btn" [disabled]="loading()">
            {{ loading() ? 'Procesando...' : 'Ingresar' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
